  apiKey = "bg_c6d544902c880d5f449ac360af4d16cb"
  secretKey = "c60ec5dd476c0f277d1f74d087bc48501db5ce2ed131e0024480c4e40676f984"
  passphrase = "huihihet"
}
trading {
  mode = "LIVE"
  type = "FUTURES"

  # [수정] 전략 변경: RSI 역추세 (DOWNTREND_RSI 재활용)
  strategy = "DOWNTREND_RSI"

  pair = "BTCUSDT"
  pairs = ["BTCUSDT", "ETHUSDT", "BNBUSDT", "SOLUSDT", "XRPUSDT"]

  timeframe = "1m"

  # RSI 계산에는 100개면 충분
  candleLimit = 100

  candleIntervalSeconds = 5
  tickerIntervalSeconds = 1

  positionStatusMinutes = 5

  allowLong = true
  allowShort = true

  futures {
    leverage = 30
    marginMode = "isolated"
    productType = "USDT-FUTURES"
  }

  paper {
    initialBalance = 10000.0
  }
}

# 리스크 관리 설정
risk {
  # [수정] 역추세는 손절을 좀 더 여유있게, 익절은 짧게
  stopLossPercent = 1.0
  takeProfitPercent = 0.65

  atrPeriod = 14
  atrSlMultiplier = 2.0

  maxPositionSize = 10000
  dailyMaxLossPercent = 5.0
  orderPercentOfBalance = 50.0
  maxOpenPositions = 5
  orderSizingStrategy = "PERCENT_OF_EQUITY"
  fixedOrderAmount = 200.0
}

# [수정] RSI 역추세 전략 설정 (downtrendRsi 섹션 재활용)
downtrendRsi {
  rsiPeriod = 14
  # 과매도 기준 (Long 진입)
  rsiThreshold = 30.0
  # 과매수 기준 (Short 진입 - 코드에서 100 - threshold로 처리하거나 별도 필드 사용)
  # 여기서는 threshold를 30으로 두면, Long은 < 30, Short는 > 70 (100-30)으로 로직 구현 예정
}

# ... (기타 설정 유지)
emaTrend { emaShortPeriod = 20, emaMediumPeriod = 50, emaLongPeriod = 200, adxPeriod = 14, adxThreshold = 25.0, stochK = 14, stochD = 3, stochSmooth = 3 }
bollingerBands { period = 20, stdDev = 2.0, rsiPeriod = 14, rsiOverbought = 50, rsiOversold = 50 }
emaStochasticScalping { shortEmaPeriod = 5, longEmaPeriod = 20, stochasticKPeriod = 14, stochasticDPeriod = 3, stochasticSlowing = 3, overboughtThreshold = 80, oversoldThreshold = 20 }
macdAtrTrend { trendEmaPeriod = 200, macdFastPeriod = 12, macdSlowPeriod = 26, macdSignalPeriod = 9 }
orderBlock { rewardToRiskRatio = 1.5, htf = "15m", ltf = "1m" }
tripleEma { shortPeriod = 9, mediumPeriod = 21, trendFilterPeriod = 200, useRsiFilter = true, rsiBuyThreshold = 30, rsiSellThreshold = 70 }
donchian { period = 14, atrPeriod = 14, atrSlMultiplier = 1.5, atrTpMultiplier = 2.0, allowLong = true, allowShort = true, trendFilterEma = 200 }
elliott { waveAnalysisDepth = 150, fibonacciTolerance = 0.08 }
heikinAshiIchimoku { conversionPeriod = 9, basePeriod = 26, spanBPeriod = 52 }

