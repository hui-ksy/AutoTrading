  takeProfitPercent = 0.3

  atrPeriod = 14
  atrSlMultiplier = 1.0
  atrTpMultiplier = 2.5

  maxPositionSize = 10000
  dailyMaxLossPercent = 5.0
  orderPercentOfBalance = 100.0
  maxOpenPositions = 5
  orderSizingStrategy = "PERCENT_OF_EQUITY"
