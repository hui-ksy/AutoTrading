# 스토캐스틱 스캘핑 설정
emaStochasticScalping {
  # EMA는 사용하지 않지만 설정값은 유지
  shortEmaPeriod = 5
  longEmaPeriod = 20

  stochasticKPeriod = 14
  stochasticDPeriod = 3
  stochasticSlowing = 3

  # 과매수/과매도 기준 (타이트하게)
  overboughtThreshold = 80.0
  oversoldThreshold = 20.0
}

# ... (기타 설정 유지)
downtrendRsi { rsiPeriod = 14, rsiThreshold = 30.0, trendEmaPeriod = 200 }
emaTrend { emaShortPeriod = 20, emaMediumPeriod = 50, emaLongPeriod = 200, adxPeriod = 14, adxThreshold = 25.0, stochK = 14, stochD = 3, stochSmooth = 3 }
bollingerBands { period = 10, stdDev = 2.0, rsiPeriod = 14, rsiOversold = 20, rsiOverbought = 80 }
macdAtrTrend { trendEmaPeriod = 200, macdFastPeriod = 12, macdSlowPeriod = 26, macdSignalPeriod = 9 }
orderBlock { rewardToRiskRatio = 1.5, htf = "15m", ltf = "1m" }
tripleEma { shortPeriod = 9, mediumPeriod = 21, trendFilterPeriod = 200, useRsiFilter = true, rsiBuyThreshold = 30, rsiSellThreshold = 70 }
donchian { period = 14, atrPeriod = 14, atrSlMultiplier = 1.5, atrTpMultiplier = 2.0, allowLong = true, allowShort = true, trendFilterEma = 200 }
elliott { waveAnalysisDepth = 150, fibonacciTolerance = 0.08 }
heikinAshiIchimoku { conversionPeriod = 9, basePeriod = 26, spanBPeriod = 52 }

# Dynamic Exit Scalping (E0V1E_53_Sharpe 류)
dynamicExitScalping {
  rsiPeriod    = 14
  rsiBuy       = 40      # RSI < rsiBuy  → Long 후보 (15m 스윕 최적)
  rsiSell      = 65      # RSI > rsiSell → Short 후보 (15m 스윕 최적)
  rsiExitLong  = 55      # Long 보유 중 RSI >= 55 → 익절
  rsiExitShort = 50      # Short 보유 중 RSI <= 50 → 익절
  smaPeriod    = 200     # SMA 추세 필터 (Long: 가격 > SMA)
  ctiPeriod    = 20      # CTI(Pearson 상관) 룩백
  ctiThreshold = -0.1    # Long: CTI < -0.1 (15m 스윕 최적)
  ewoPeriod1   = 5       # EWO fast EMA
  ewoPeriod2   = 35      # EWO slow EMA
  atrPeriod    = 14
  atrSlMult    = 2.0     # SL = 진입가 ± ATR * 2.0 (15m 최적)
  atrTpMult    = 3.0     # TP = 진입가 ± ATR * 3.0 (15m 최적, R:R=1.5)
}

